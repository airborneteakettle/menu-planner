<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Planner – Forgot Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background:#f4f6f4; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .card { width:100%; max-width:380px; border:none; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,.1); }
    .card-header-brand { background:#1b5e20; color:#fff; border-radius:12px 12px 0 0; padding:1.5rem; text-align:center; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header-brand">
      <div style="font-size:2rem"><i class="bi bi-journal-richtext"></i></div>
      <h5 class="mb-0 fw-bold">Menu Planner</h5>
    </div>
    <div class="card-body p-4">
      {% if sent %}
        <div class="text-center py-2">
          <i class="bi bi-envelope-check-fill text-success" style="font-size:2.5rem"></i>
          <h6 class="fw-semibold mt-3">Check your inbox</h6>
          <p class="text-muted small">
            If that email is registered, a reset link has been sent.
            The link expires in 1 hour.
          </p>
          <a href="/login" class="btn btn-outline-success btn-sm mt-1">Back to sign in</a>
        </div>
      {% else %}
        <h6 class="fw-semibold mb-1">Forgot your password?</h6>
        <p class="text-muted small mb-3">
          Enter your email address and we'll send you a reset link.
        </p>
        <form method="post">
          <div class="mb-3">
            <label class="form-label fw-medium" for="email">Email address</label>
            <input type="email" class="form-control" id="email" name="email"
                   autofocus autocomplete="email" required>
          </div>
          <button type="submit" class="btn btn-success w-100 fw-semibold">
            Send reset link
          </button>
        </form>
        <div class="text-center mt-3">
          <a href="/login" class="small text-muted">Back to sign in</a>
        </div>
      {% endif %}
    </div>
  </div>
</body>
</html>
