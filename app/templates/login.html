<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Planner – Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body {
      background: #f4f6f4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      width: 100%;
      max-width: 380px;
      border: none;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,.1);
    }
    .login-header {
      background: #1b5e20;
      color: #fff;
      border-radius: 12px 12px 0 0;
      padding: 1.5rem;
      text-align: center;
    }
    .login-header .app-icon {
      font-size: 2rem;
      margin-bottom: .5rem;
    }
  </style>
</head>
<body>
  <div class="login-card card">
    <div class="login-header">
      <div class="app-icon"><i class="bi bi-journal-richtext"></i></div>
      <h5 class="mb-0 fw-bold">Menu Planner</h5>
    </div>
    <div class="card-body p-4">
      {% if error %}
        <div class="alert alert-danger py-2 small">{{ error }}</div>
      {% endif %}
      <form method="post">
        <div class="mb-3">
          <label class="form-label fw-medium" for="username">Username</label>
          <input type="text" class="form-control" id="username" name="username"
                 autofocus autocomplete="username" required>
        </div>
        <div class="mb-4">
          <label class="form-label fw-medium" for="password">Password</label>
          <input type="password" class="form-control" id="password" name="password"
                 autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-success w-100 fw-semibold">
          Sign in
        </button>
      </form>
      <div class="text-center mt-3">
        <a href="/forgot-password" class="small text-muted">Forgot your password?</a>
      </div>
    </div>
  </div>
</body>
</html>
